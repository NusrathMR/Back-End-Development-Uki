<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator 2</title>

    <style>
        fieldset{
            height: 230px;
            width: 130px;
            border-style: groove;
        }

        button{
            border-radius: 10%;
            border-style: outset;
            font-family: poppins;
            width: 25px;
            height: 25px;
        }


    </style>
</head>
<body>
    <fieldset>
    <center>
        <br>
        <input type="number" style="width: 100px;"> <br><br>

        <button id="1">1</button> <button id="2">2</button> <button id="3">3</button> <button id="+" style="background-color: yellow;">+</button> <br><br>
        <button id="4">4</button> <button id="5">5</button> <button id="6">6</button> <button id="-" style="background-color: yellow;">-</button> <br><br>
        <button id="7">7</button> <button id="8">8</button> <button id="9">9</button> <button id="*" style="background-color: yellow;">*</button> <br><br>
        <button id="0">0</button> <button id="=" style="background-color: green;">=</button> <button id="/" style="background-color: yellow;">/</button> <button id="C" style="background-color: red;">C</button> <br><br>
    
    </center>
    </fieldset>
</body>
</html>
